# MemoriaServer 開発・展示用 docker-compose 構成。
#
# 用途：
#   - 9月展示会・自宅検証用にワンコマンドで MS + Redis + Solid Queue を立ち上げる
#   - アダプタ開発者がリポジトリを clone して `docker compose up` だけで動かせる
#
# 注意：本番（Kamal等）では別途 production 構成を使うこと。これは development 想定。

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${MS_PORT:-3000}:3000"
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "1"
      MS_REDIS_URL: redis://redis:6379/0
      VAULT_ROOT: /vaults
      MS_KEY_PEPPER: ${MS_KEY_PEPPER:-please-change-this-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    volumes:
      - ./storage:/rails/storage
      - ${VAULT_HOST_PATH:-./tmp/vaults}:/vaults
    command: ["bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "1"
      MS_REDIS_URL: redis://redis:6379/0
      VAULT_ROOT: /vaults
      MS_KEY_PEPPER: ${MS_KEY_PEPPER:-please-change-this-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    volumes:
      - ./storage:/rails/storage
      - ${VAULT_HOST_PATH:-./tmp/vaults}:/vaults
    command: ["bin/rails", "solid_queue:start"]
